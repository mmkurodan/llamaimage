name: Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # JavaScript 製 action を Node.js 24 で実行する
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # app/build.gradle の release signingConfig が参照する値
  KEYSTORE_PASSWORD: 'micklab'
  KEY_ALIAS: 'mykey'
  KEY_PASSWORD: 'micklab'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # Node.js 24 対応版を使って廃止警告を回避する
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper (8.7)
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew

      # ネイティブ層 (libsd_jni.so) のビルドに必要な NDK と CMake を導入する。
      # build.gradle の ndkVersion と一致させ、AGP が確実に検出できるようにする。
      - name: Install Android NDK & CMake
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;27.2.12479018" "cmake;3.22.1"

      # 固定コミットの stable-diffusion.cpp + ggml を取得する (リポジトリには未コミット)。
      # CMake configure 時にも自動取得されるが、明示ステップにして失敗を切り分けやすくする。
      - name: Fetch stable-diffusion.cpp + ggml (pinned)
        run: bash scripts/fetch-sdcpp.sh

      # GPU(Vulkan) バックエンドのビルド準備。Android へクロスコンパイルするため、
      # シェーダ生成ツールはホスト用にビルドし、glslc・Vulkan-Hpp ヘッダ・NDK の
      # libvulkan.so スタブのパスを env 経由で build.gradle に渡す。
      - name: Set up Vulkan GPU build toolchain
        run: |
          set -euo pipefail
          # glslc (GLSL -> SPIR-V) をホストに導入
          sudo apt-get update
          sudo apt-get install -y glslc
          echo "SD_GLSLC=$(command -v glslc)" >> "$GITHUB_ENV"

          # Vulkan-Hpp ヘッダ (NDK は vulkan.hpp を同梱しないため Khronos から取得)
          git clone --depth 1 --branch v1.3.296 \
            https://github.com/KhronosGroup/Vulkan-Headers.git "$RUNNER_TEMP/Vulkan-Headers"
          echo "SD_VK_HEADERS=$RUNNER_TEMP/Vulkan-Headers/include" >> "$GITHUB_ENV"

          # vulkan-shaders-gen をホスト用にビルド (ターゲット用だと実行できない)
          g++ -O2 -std=c++17 \
            app/src/main/cpp/sd/ggml/src/ggml-vulkan/vulkan-shaders/vulkan-shaders-gen.cpp \
            -o "$RUNNER_TEMP/vulkan-shaders-gen" -lpthread
          echo "SD_VK_SHADERS_GEN=$RUNNER_TEMP/vulkan-shaders-gen" >> "$GITHUB_ENV"

          # リンク用 libvulkan.so (NDK sysroot 内の最も高い API のスタブを使う)
          NDK="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          LIBDIR="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android"
          BEST=$(for d in "$LIBDIR"/[0-9]*; do [ -f "$d/libvulkan.so" ] && basename "$d"; done | sort -n | tail -1)
          echo "Using libvulkan.so from API $BEST"
          echo "SD_VK_LIBRARY=$LIBDIR/$BEST/libvulkan.so" >> "$GITHUB_ENV"

      - name: Build Debug APK
        run: ./gradlew --no-daemon --console=plain assembleDebug

      - name: Decode Keystore
        run: |
          # AGP が参照する app/ 配下へ keystore を復元する
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        # release.apk も生成し、同じ署名設定でビルドする
        run: ./gradlew --no-daemon --console=plain assembleRelease

      - name: Build Signed Release AAB
        # injected signing は使わず、app/build.gradle の署名設定を使う
        run: ./gradlew --no-daemon --console=plain bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
